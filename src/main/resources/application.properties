spring.main.web-application-type=none
spring.main.banner-mode=off
logging.threshold.console=OFF
logging.file.name=./logs/opendota-mcp.log
spring.ai.mcp.server.stdio=true
spring.ai.mcp.server.name=opendota-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.annotation-scanner.enabled=false

# Client tuning (optional; override via env vars, -D flags, or external config).
# Max cached OpenDota responses retained before the nearest-to-expiry entry is evicted.
opendota.cache-max-entries=4096
# Approximate max total bytes of cached response bodies before eviction (heap bound).
opendota.cache-max-bytes=67108864
# Max time a request waits for a rate-limit permit before returning a rate-limited error.
opendota.rate-limit-budget=10s
# Max bytes of a single upstream response body; larger responses are aborted, not buffered.
opendota.max-response-bytes=16777216
