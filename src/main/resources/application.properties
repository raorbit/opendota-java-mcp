spring.main.web-application-type=none
spring.main.banner-mode=off
logging.threshold.console=OFF
logging.file.name=./logs/opendota-mcp-${PID}.log
# Each JVM logs to its own per-PID file; on startup, orphaned files older than this many days are
# purged (the current process's file is always kept). See LogRetentionCleaner.
opendota.log-retention-days=7
spring.ai.mcp.server.stdio=true
spring.ai.mcp.server.name=opendota-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.annotation-scanner.enabled=false

# Client tuning (optional; override via env vars, -D flags, or external config).
# Max cached OpenDota responses retained before the nearest-to-expiry entry is evicted.
opendota.cache-max-entries=4096
# Approximate max total bytes of cached response bodies before eviction (heap bound).
opendota.cache-max-bytes=67108864
# Max time a request waits for a rate-limit permit before returning a rate-limited error.
opendota.rate-limit-budget=10s
# Max bytes of a single upstream response body; larger responses are aborted, not buffered.
opendota.max-response-bytes=16777216
# Outbound rate-limit permits per minute (0 = tier default: 300 keyed / 60 keyless).
# When several server processes share one API key, set this to
# tier_budget / expected_concurrent_processes (e.g. 300 / 10 = 30) so their combined
# outbound rate stays within OpenDota's real per-key ceiling. Superseded by the shared sidecar.
opendota.rate-limit-permits-per-minute=0

# Shared sidecar (for running several agents off one API key). When true, this server
# forwards all OpenDota calls to the local sidecar instead of calling OpenDota directly;
# the sidecar then holds OPENDOTA_API_KEY and enforces the one real rate limit. See
# docs/mcp-registration.md. Default false = talk to OpenDota directly.
opendota.sidecar-enabled=false
opendota.sidecar-host=127.0.0.1
opendota.sidecar-port=31337
# Optional shared secret for a sidecar started with OPENDOTA_SIDECAR_TOKEN. Leave blank when
# the sidecar runs without auth (the default). When set, it is sent as the X-Sidecar-Token header.
opendota.sidecar-token=
