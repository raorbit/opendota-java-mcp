# Opt-in HTTP (remote-MCP) profile. Activated by spring.profiles.active=http and ONLY
# meaningful when the jar was built with -Phttp (so the Spring AI webmvc starter and an
# embedded web server are on the classpath). The default stdio build never loads this file.
#
# These keys override the base application.properties to flip from the stdio transport to
# the Streamable-HTTP transport that Claude's "Add custom connector -> Remote MCP server URL"
# dialog speaks. stdout-safety / banner-off only matter for stdio, so console output is
# safe to re-enable here.

# Start the embedded Tomcat (base sets 'none').
spring.main.web-application-type=servlet
# Turn the stdio transport OFF (base sets it true).
spring.ai.mcp.server.stdio=false
# CRITICAL: select the Streamable-HTTP transport. The library default is SSE (deprecated);
# Claude's remote-connector wants the single-endpoint Streamable HTTP, so set this explicitly.
spring.ai.mcp.server.protocol=STREAMABLE
# The single MCP endpoint path (library default is already /mcp). This is the path appended
# to the public https host you paste into the custom-connector dialog.
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp

# Embedded servlet container bind. There is NO MCP-specific port property; the transport binds
# to the standard Spring Boot server. Default to LOOPBACK so a TLS proxy/tunnel forwards to it
# and the fail-closed guard does not trip when no bearer token is set. Bind a non-loopback
# address only WITH a bearer token (the guard enforces this). Override with OPENDOTA_HTTP_* /
# SERVER_* env vars or -D flags.
server.address=127.0.0.1
server.port=8080

# Re-enable banner + console logging (safe in http mode; stdout framing only matters for stdio).
spring.main.banner-mode=console
logging.threshold.console=INFO

# Route the http instance through the shared sidecar (rate limiter / TtlCache / L2 / watched
# archive). The existing openDotaClient bean switches to forwardingTo(...) with no code change.
# Disable this (opendota.sidecar-enabled=false) only if the http instance must hold the API key
# itself and run its own per-process limiter/cache.
opendota.sidecar-enabled=true

# HTTP auth. Default bearer (fail-safe): callers must present Authorization: Bearer <token>.
# Supply the secret via OPENDOTA_HTTP_BEARER_TOKEN; never commit it. Set auth-mode=none only
# behind a trusted fronting proxy on a loopback bind (the startup guard refuses none/no-token
# on a non-loopback bind). The fronting proxy terminates TLS and (for the in-app OAuth dialog)
# injects this bearer header; see docs/remote-connector.md.
opendota.http.auth-mode=bearer
opendota.http.bearer-token=${OPENDOTA_HTTP_BEARER_TOKEN:}

# In auth-mode=none an anti-DNS-rebinding guard (HostGuardFilter) rejects any Host header that is
# not a loopback literal. Proxies/tunnels (cloudflared, Caddy) forward the original PUBLIC Host to
# the loopback app, so allow-list that hostname here (comma-separated literals; ports ignored,
# never DNS-resolved) or the tunnel's requests will be refused with 403:
#   opendota.http.allowed-hosts=opendota.example.com
# Unused in bearer mode. /actuator/health stays un-gated for liveness probes.
opendota.http.allowed-hosts=${OPENDOTA_HTTP_ALLOWED_HOSTS:}

# Liveness. Expose ONLY the actuator health endpoint (BearerAuthFilter leaves /actuator/health
# un-gated) so a fronting proxy/tunnel can probe the instance; nothing else is web-exposed, and
# health never shows component details.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
